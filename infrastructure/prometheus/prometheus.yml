# =============================================================================
# prometheus.yml — Prometheus scrape configuration
# =============================================================================
# What Prometheus is, in one sentence:
#   A server that periodically hits /metrics endpoints on your apps,
#   stores the numbers, and lets you query them with PromQL.
#
# How metrics flow (your app already does the first two):
#   1. Your FastAPI app exposes /metrics (already wired in app/main.py)
#   2. The Prometheus client library counts requests, latencies, errors
#   3. Prometheus scrapes /metrics every 15s (configured below)
#   4. Grafana queries Prometheus to draw dashboards (next file)
#
# Key concept: PULL model
#   Prometheus REACHES OUT to your app on a schedule. Your app doesn't push.
#   This means: add a new service → just tell Prometheus where to scrape it.
#   Push-based systems require the app to know where the metrics server is.
# =============================================================================

global:
  scrape_interval:     15s                 # how often to poll /metrics
  evaluation_interval: 15s                 # how often to evaluate alert rules
  external_labels:
    cluster: sentimentai-prod              # tag every metric with this label
    environment: production

# ──────────────────────────────────────────────────────────────────────────────
# scrape_configs: where to collect metrics from
# ──────────────────────────────────────────────────────────────────────────────

scrape_configs:
  # ── Prometheus itself ───────────────────────────────────────────────────
  # Useful for monitoring the monitor (memory, scrape duration, target health)
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── SentimentAI API ──────────────────────────────────────────────────────
  # In docker-compose: the service name resolves via Docker's DNS to the container
  - job_name: sentimentai-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]              # docker-compose service name
        labels:
          service: sentimentai
          component: api

  # ── Redis exporter (optional but recommended) ───────────────────────────
  # Native Redis doesn't expose Prometheus metrics — we'd add a sidecar.
  # Commented out by default; uncomment if you add the redis-exporter container.
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # ── Node exporter (for host-level metrics) ──────────────────────────────
  # If you also want CPU/disk/network metrics for the underlying machine,
  # run prom/node-exporter as a separate container and uncomment this.
  # - job_name: node
  #   static_configs:
  #     - targets: ["node-exporter:9100"]

# ──────────────────────────────────────────────────────────────────────────────
# Kubernetes service discovery — for the K8s deployment
# ──────────────────────────────────────────────────────────────────────────────
